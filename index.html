<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKIPTV Proxy Server</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-color: #c9d1d9;
      --primary-color: #58a6ff;
      --border-color: #30363d;
      --success-green: #3fb950;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 40px 30px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: rgba(63, 185, 80, 0.15);
      color: var(--success-green);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 24px;
      border: 1px solid rgba(63, 185, 80, 0.3);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: var(--success-green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--success-green);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(63, 185, 80, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(63, 185, 80, 0); }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 12px 0;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 0 0 24px 0;
      color: #8b949e;
    }

    .redirect-msg {
      font-size: 0.8rem;
      color: var(--primary-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 500;
    }

    .spinner {
      border: 2px solid rgba(88, 166, 255, 0.1);
      border-left-color: var(--primary-color);
      border-radius: 50%;
      width: 14px;
      height: 14px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    a {
      color: var(--primary-color);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
  <script>
    setTimeout(function() {
      window.location.href = 'https://skiptv.pages.dev';
    }, 3000);
  </script>
</head>
<body>
  <div class="container">
    <div class="status-badge">
      <div class="status-dot"></div>
      Proxy Servers Online
    </div>
    <h1>SKIPTV Backend Active</h1>
    <p>The Cloudflare Pages proxy server is actively routing Toffee Live and Bioscope Live streams to avoid geo-blocks and CORS restrictions.</p>
    <div class="redirect-msg">
      <div class="spinner"></div>
      Redirecting to <a href="https://skiptv.pages.dev">skiptv.pages.dev</a> in 3 seconds...
    </div>
  </div>
</body>
</html>
